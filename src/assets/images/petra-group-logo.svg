<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Gold "P" with Bridge -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a23f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main P Letter -->
  <text x="80" y="180" font-size="200" font-weight="bold" font-family="Georgia, serif" fill="url(#goldGradient)" letter-spacing="5">P</text>
  
  <!-- Bridge illustration -->
  <g transform="translate(280, 60)">
    <!-- Bridge structure -->
    <line x1="20" y1="80" x2="200" y2="60" stroke="#1a1a1a" stroke-width="8"/>
    <line x1="200" y1="60" x2="380" y2="100" stroke="#1a1a1a" stroke-width="8"/>
    
    <!-- Bridge supports -->
    <rect x="15" y="80" width="6" height="40" fill="#1a1a1a"/>
    <rect x="95" y="70" width="6" height="50" fill="#1a1a1a"/>
    <rect x="175" y="55" width="6" height="65" fill="#1a1a1a"/>
    <rect x="255" y="70" width="6" height="50" fill="#1a1a1a"/>
    <rect x="335" y="80" width="6" height="40" fill="#1a1a1a"/>
  </g>
  
  <!-- Company Name -->
  <text x="100" y="240" font-size="28" font-weight="bold" font-family="Arial, sans-serif" fill="#1a1a1a" letter-spacing="8">THE PETRA GROUP</text>
  <text x="100" y="265" font-size="14" font-family="Arial, sans-serif" fill="#666" letter-spacing="2">Insurance & Financial Services</text>
  <text x="100" y="285" font-size="12" font-style="italic" font-family="Georgia, serif" fill="#999">Bridging the gap in Benefits Communication</text>
</svg>
