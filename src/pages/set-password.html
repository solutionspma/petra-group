<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set your password | The Petra Group</title>
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .pw-wrap { max-width: 480px; margin: 72px auto; padding: 40px 28px; background: var(--gray); border-radius: 8px; border-left: 5px solid var(--gold); }
    .pw-wrap h1 { font-size: 1.4rem; margin-bottom: 10px; }
    .pw-wrap p { color: #444; margin-bottom: 20px; font-size: 0.95rem; line-height: 1.5; }
    .pw-wrap label { display: block; font-weight: bold; margin: 14px 0 6px; font-size: 0.9rem; }
    .pw-wrap input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
    .pw-wrap button { margin-top: 22px; width: 100%; padding: 14px; font-weight: bold; background: var(--gold); border: none; border-radius: 8px; cursor: pointer; color: #1a1508; }
    .pw-err { color: #b71c1c; margin-top: 12px; font-size: 0.9rem; }
  </style>
</head>
<body>

<main class="pw-wrap">
  <h1>Set your site owner password</h1>
  <p>You signed in with the temporary password. Choose a new password (10+ characters). This is stored only in this browser until we connect Supabase.</p>
  <form id="pw-form">
    <label for="pw1">New password</label>
    <input type="password" id="pw1" name="pw1" autocomplete="new-password" required minlength="10">
    <label for="pw2">Confirm password</label>
    <input type="password" id="pw2" name="pw2" autocomplete="new-password" required minlength="10">
    <button type="submit">Save and continue</button>
    <p class="pw-err" id="pw-err" role="alert"></p>
  </form>
</main>

<script type="module">
import { getCurrentUser, completeMasterPasswordChange, loginPath } from '../js/auth.stub.js';

const u = getCurrentUser();
if (!u || u.role !== 'master' || !u.mustChangePassword) {
  window.location.href = u?.role === 'master' ? '../portal/index.html' : loginPath();
}

document.getElementById('pw-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('pw-err');
  err.textContent = '';
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const r = await completeMasterPasswordChange(pw1, pw2);
  if (!r.ok) {
    err.textContent = r.error;
    return;
  }
  window.location.href = '../portal/index.html';
});
</script>
</body>
</html>
