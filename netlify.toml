[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # My Drive (Supabase): add in Netlify UI → SUPABASE_URL, SUPABASE_ANON_KEY, optional SUPABASE_DRIVE_BUCKET (default tpg-private)

[functions]
  directory = "netlify/functions"

# No catch-all SPA rewrite: this site is static HTML pages. A /* → index.html rule caused
# missing files (e.g. not-yet-deployed .mobileconfig) to return HTML, so iOS showed a broken profile.

[dev]
  command = "node build.js && python3 -m http.server 8000 --directory dist"
  port = 8000

# iOS Mail / configuration profiles must be served with Apple’s MIME type so Safari offers “Install”.
[[headers]]
  for = "/assets/documents/email-profiles/*.mobileconfig"
  [headers.values]
    Content-Type = "application/x-apple-aspen-config; charset=utf-8"
